<svg viewBox="0 0 800 650" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景 -->
  <rect width="800" height="650" fill="#f8f8f8"/>

  <!-- 标题 -->
  <text x="400" y="25" text-anchor="middle" font-size="16" font-weight="bold" fill="#333">客厅南北门位置与墙体关系图（南面朝上）</text>

  <!-- 整体布局框架 -->
  <!-- 多功能室（北）- 下方 -->
  <rect x="50" y="380" width="700" height="120" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
  <text x="400" y="430" text-anchor="middle" font-size="12" fill="#1565c0">多功能室 (北向)</text>

  <!-- 客厅 - 中间 -->
  <rect x="100" y="180" width="570" height="200" fill="#fff8e1" stroke="#f57c00" stroke-width="2"/>
  <text x="385" y="280" text-anchor="middle" font-size="12" fill="#e65100">客厅 (面宽 7750mm)</text>

  <!-- 主卧区域（东侧-右边） -->
  <rect x="670" y="180" width="80" height="320" fill="#fce4ec" stroke="#c2185b" stroke-width="1"/>
  <text x="710" y="340" text-anchor="middle" font-size="9" fill="#c2185b">主卧</text>
  <text x="710" y="355" text-anchor="middle" font-size="8" fill="#c2185b">(东)</text>

  <!-- 阳台（南）- 上方 -->
  <rect x="100" y="80" width="570" height="100" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
  <text x="385" y="130" text-anchor="middle" font-size="12" fill="#2e7d32">阳台 (南向)</text>

  <!-- 西墙（左侧） -->
  <rect x="50" y="180" width="50" height="320" fill="#d7d7d7" stroke="#333"/>
  <text x="75" y="340" text-anchor="middle" font-size="9" fill="#333">西墙</text>

  <!-- 东墙（主卧隔墙-右侧） -->
  <line x1="670" y1="180" x2="670" y2="500" stroke="#c2185b" stroke-width="3"/>

  <!-- ========== 南门（阳台门） ========== -->
  <!-- 原门位置 1600mm，居中 -->
  <rect x="305" y="175" width="160" height="15" fill="#ff6b6b" opacity="0.4" stroke="#ff6b6b" stroke-width="1"/>

  <!-- 新门位置 2800mm：东扩900（右边） + 西扩300（左边） -->
  <!-- 原门西边缘（左边）：305，西扩300后 = 275 -->
  <!-- 原门东边缘（右边）：465，东扩900后 = 555 -->
  <!-- 新门范围：275-555，宽度280 -->
  <rect x="275" y="175" width="280" height="15" fill="#4caf50" stroke="#2e7d32" stroke-width="2"/>

  <!-- 南门标注 -->
  <text x="415" y="165" text-anchor="middle" font-size="11" fill="#2e7d32" font-weight="bold">南门 2800mm (两轨两扇)</text>

  <!-- 西扩标注（左边） -->
  <line x1="305" y1="175" x2="275" y2="175" stroke="#666" stroke-width="1"/>
  <text x="290" y="150" text-anchor="middle" font-size="9" fill="#666">西扩300</text>
  <path d="M305 175 L295 172 L295 178 Z" fill="#666"/>

  <!-- 东扩标注（右边） -->
  <line x1="465" y1="175" x2="555" y2="175" stroke="#666" stroke-width="1"/>
  <text x="510" y="150" text-anchor="middle" font-size="9" fill="#666">东扩900</text>
  <path d="M465 175 L475 172 L475 178 Z" fill="#666"/>

  <!-- ========== 北门（多功能室门） ========== -->
  <!-- 原门位置 1600mm -->
  <rect x="305" y="380" width="160" height="15" fill="#ff6b6b" opacity="0.4" stroke="#ff6b6b" stroke-width="1"/>

  <!-- 新门位置 2200mm：东扩600（右边） + 西不动（左边） -->
  <!-- 原门西边缘（左边）：305，不动 -->
  <!-- 原门东边缘（右边）：465，东扩600后 = 525 -->
  <!-- 新门范围：305-525，宽度220 -->
  <rect x="305" y="380" width="220" height="15" fill="#2196f3" stroke="#1565c0" stroke-width="2"/>

  <!-- 北门标注 -->
  <text x="415" y="395" text-anchor="middle" font-size="11" fill="#1565c0" font-weight="bold">北门 2200mm (三联动)</text>

  <!-- 西不动标注（左边） -->
  <text x="305" y="370" text-anchor="start" font-size="9" fill="#666">西不动</text>

  <!-- 东扩标注（右边） -->
  <line x1="465" y1="380" x2="525" y2="380" stroke="#666" stroke-width="1"/>
  <text x="495" y="370" text-anchor="middle" font-size="9" fill="#666">东扩600</text>
  <path d="M465 380 L475 377 L475 383 Z" fill="#666"/>

  <!-- ========== 不对称分析 ========== -->
  <!-- 西边缘对比（左边） -->
  <line x1="275" y1="175" x2="275" y2="380" stroke="#e53935" stroke-dasharray="4,2"/>
  <line x1="305" y1="175" x2="305" y2="380" stroke="#ff9800" stroke-dasharray="4,2"/>
  <text x="180" y="270" font-size="10" fill="#e53935">南门西边向西扩300</text>
  <text x="180" y="285" font-size="10" fill="#ff9800">北门西边不动</text>

  <!-- 不对称区域标注 -->
  <rect x="275" y="275" width="30" height="20" fill="#ffcdd2" stroke="#e53935"/>
  <text x="290" y="290" text-anchor="middle" font-size="8" fill="#e53935">差300</text>

  <!-- ========== 尺寸对比表 ========== -->
  <rect x="550" y="50" width="200" height="130" fill="#fafafa" stroke="#ddd" rx="5"/>
  <text x="650" y="70" text-anchor="middle" font-size="12" font-weight="bold" fill="#333">尺寸对比</text>

  <text x="560" y="95" font-size="10" fill="#2e7d32">南门(阳台):</text>
  <text x="560" y="110" font-size="9" fill="#666">原 1600mm → 新 2800mm</text>
  <text x="560" y="125" font-size="9" fill="#666">西扩300 + 东扩900</text>
  <text x="560" y="140" font-size="9" fill="#666">两扇推拉单扇 ~1400mm</text>

  <text x="560" y="160" font-size="10" fill="#1565c0">北门(多功能):</text>
  <text x="560" y="175" font-size="9" fill="#666">原 1600mm → 新 2200mm</text>
  <text x="560" y="190" font-size="9" fill="#666">西不动 + 东扩600</text>
  <text x="560" y="205" font-size="9" fill="#666">三联动单扇 ~733mm</text>

  <!-- ========== 方向标识 ========== -->
  <text x="400" y="60" text-anchor="middle" font-size="11" fill="#2e7d32" font-weight="bold">↑ 南 (阳台)</text>
  <text x="400" y="520" text-anchor="middle" font-size="11" fill="#1565c0" font-weight="bold">↓ 北 (多功能室)</text>
  <text x="30" y="350" font-size="10" fill="#666" font-weight="bold">← 西</text>
  <text x="770" y="350" font-size="10" fill="#c2185b" font-weight="bold">东 →</text>

  <!-- ========== 比例尺 ========== -->
  <line x1="100" y1="550" x2="670" y1="550" stroke="#333" stroke-width="1"/>
  <text x="100" y="565" font-size="9" fill="#666">0</text>
  <text x="385" y="565" text-anchor="middle" font-size="9" fill="#666">3875mm</text>
  <text x="670" y="565" text-anchor="end" font-size="9" fill="#666">7750mm</text>

  <!-- ========== 结论说明 ========== -->
  <rect x="50" y="580" width="700" height="60" fill="#fff3e0" stroke="#ff9800" rx="5"/>
  <text x="400" y="598" text-anchor="middle" font-size="11" fill="#e65100" font-weight="bold">不对称原因分析：</text>
  <text x="400" y="616" text-anchor="middle" font-size="10" fill="#666">南门西扩300mm，北门西不动 → 西边缘相差300mm</text>
  <text x="400" y="631" text-anchor="middle" font-size="10" fill="#666">两个门中心点均向东移动300mm；门型以最新门窗方案文档为准</text>
</svg>
